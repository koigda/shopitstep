{% extends 'layout/main_layout.html'%}
{% load crispy_forms_tags %}
{% block content %}

<div class="modal-body">
    {% if messages %}
        {% for message in messages %}
            <p>{{ message }}</p>
        {% endfor %}
    {% endif %}
</div>

<form method="post" action="{% url 'create_post' %}">
    {% csrf_token %}
    {{ form|crispy }}
    <input type="submit" class="btn btn-default" value="save">
</form>



{% endblock %}
